---
project:
  title:       "BioRLE-1 — Lossless Biosignal Compressor"
  author:      "Julio Izquierdo"
  discord:     ""
  description: >
    Lossless ECG/EEG delta-RLE compressor for Holter monitors and wearable biosignal
    loggers. Receives 16-bit ADC samples from a TI ADS1292R over SPI (Mode 1, 72-bit
    frame, up to 4 MHz), applies first-order delta encoding with signed saturation
    clamping to 8 bits, then run-length encodes (RLE) consecutive identical deltas
    and streams the compressed (value, count) byte pairs over UART at 921,600 bps.
    Typical compression ratio for ECG signals: 2–4x. Estimated cell count: ~139 cells.
  language:    "Verilog"
  clock_hz:    25000000

  tiles:       "1x1"

  top_module:  "tt_um_biorle1"

  source_files:
    - "tt_um_biorle1.v"
    - "biorle1_spi_rx.v"
    - "biorle1_delta.v"
    - "biorle1_rle.v"
    - "biorle1_out.v"

  # ── Inputs (ui_in[7:0]) ────────────────────────────────────────────────────
  #   Listed LSB first (index 0 → ui_in[0])
  inputs:
    - "spi_mosi: ADS1292R DOUT — async SPI serial data (2-FF synchronized inside)"
    - "spi_sck: ADS1292R SCLK — async SPI clock (≤ 4 MHz, treated as data)"
    - "spi_cs_n: ADS1292R CS_N — async active-low chip-select"
    - "bypass: Delta encoder bypass (0 = compress, 1 = raw upper byte pass-through)"
    - "flush: RLE flush request — pulse high 1 cycle to force-emit pending run"
    - "none"
    - "channel_sel: Channel select (0 = CH1, 1 = CH2 from ADS1292R 72-bit frame)"
    - "none"

  # ── Outputs (uo_out[7:0]) ──────────────────────────────────────────────────
  #   Listed LSB first (index 0 → uo_out[0])
  outputs:
    - "uart_tx: UART TX serial stream — 8N1, 921,600 bps to host MCU"
    - "drdy: Data-ready — high while TX buffer non-empty or transmission in progress"
    - "frame_active: SPI frame in progress — high while ADS1292R CS_N is asserted"
    - "spi_error: SPI framing error — CS_N rose before 72-bit frame completed"
    - "overflow_flag: Delta saturation event — clamping applied on last delta"
    - "frame_sync: RLE pair boundary pulse — 1-cycle pulse at start of each (value, count)"
    - "comp_ratio[0]: Compression ratio LSB — rolling 2-bit estimate (00=no data, 11=4x)"
    - "comp_ratio[1]: Compression ratio MSB"

  # ── Bidirectional (uio[7:0]) — unused in BioRLE-1 ─────────────────────────
  #   uio_oe = 0x00 (all configured as inputs); uio_out = 0x00
  bidirectional:
    - "none"
    - "none"
    - "none"
    - "none"
    - "none"
    - "none"
    - "none"
    - "none"

