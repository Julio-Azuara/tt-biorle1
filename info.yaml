project:
  title:       "BioRLE-1 — Lossless Biosignal Compressor"
  author:      "Julio Izquierdo"
  discord:     ""
  description: >
    Lossless ECG/EEG delta-RLE compressor for Holter monitors and wearable biosignal
    loggers. Receives 16-bit ADC samples from a TI ADS1292R over SPI (Mode 1, 72-bit
    frame, up to 4 MHz), applies first-order delta encoding with signed saturation
    clamping to 8 bits, then run-length encodes consecutive identical deltas and
    streams compressed (value, count) byte pairs over UART at 921,600 bps.
    Typical compression ratio for ECG signals: 2-4x. Estimated cell count: ~139 cells.
  language:    "Verilog"
  clock_hz:    25000000

  tiles: "1x1"

  top_module:  "tt_um_biorle1"

  source_files:
    - "tt_um_biorle1.v"
    - "biorle1_spi_rx.v"
    - "biorle1_delta.v"
    - "biorle1_rle.v"
    - "biorle1_out.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "spi_mosi"
  ui[1]: "spi_sck"
  ui[2]: "spi_cs_n"
  ui[3]: "bypass"
  ui[4]: "flush"
  ui[5]: ""
  ui[6]: "channel_sel"
  ui[7]: ""

  # Outputs
  uo[0]: "uart_tx"
  uo[1]: "drdy"
  uo[2]: "frame_active"
  uo[3]: "spi_error"
  uo[4]: "overflow_flag"
  uo[5]: "frame_sync"
  uo[6]: "comp_ratio[0]"
  uo[7]: "comp_ratio[1]"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
